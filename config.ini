[model]
n_estimators = 100
max_depth    = 10
random_state = 123
test_size    = 0.2
valid_size   = 0.1

[integrations]
database_enabled  = false
vault_enabled     = false
messaging_enabled = false

[database]
host = postgres
port = 5432
name = mldb
user = mluser

[vault]
addr  = http://vault:8200
token = devtoken

[kafka]
bootstrap_servers = kafka:9092
topic             = model-predictions
group_id          = ml-consumer-group
