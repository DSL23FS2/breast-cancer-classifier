# docker-compose.yml — единый DevOps-контур
# v1.0: api + jenkins
# v2.0: + postgres
# v3.0: + vault
# v4.0: + zookeeper + kafka + consumer

services:

  # ── ML API сервис ────────────────────────────────────────────
  api:
    build: .
    image: ${DOCKERHUB_USER:-local}/breast-cancer-api:${IMAGE_TAG:-latest}
    container_name: bc-api
    ports:
      - "8000:8000"
    volumes:
      - dvc-artifacts:/app/experiments
    environment:
      - PYTHONPATH=/app
    networks:
      - app-network
    restart: unless-stopped

  # ── Jenkins CI/CD ────────────────────────────────────────────
  jenkins:
    build: ./jenkins
    image: ${DOCKERHUB_USER:-local}/breast-cancer-jenkins:${IMAGE_TAG:-latest}
    container_name: bc-jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - dvc-artifacts:/dvc-artifacts
      - .:/workspace:ro
    environment:
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - app-network
    restart: unless-stopped

